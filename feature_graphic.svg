<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1024" height="500" viewBox="0 0 1024 500">

  <!-- Background – matching icon blue -->
  <rect width="1024" height="500" fill="#5090CC"/>

  <!-- Subtle dark overlay right side for text contrast -->
  <rect x="360" y="0" width="664" height="500" fill="#000000" opacity="0.20"/>

  <!-- App icon – left side, vertically centered -->
  <image href="app/src/main/ic_launcher-playstore.png"
         x="50" y="80" width="320" height="320"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- App name -->
  <text x="420" y="208"
        font-family="Arial, Helvetica, sans-serif"
        font-size="76"
        font-weight="bold"
        fill="#FFFFFF"
        letter-spacing="-1">Wien Abfahrt</text>

  <!-- Red accent bar -->
  <rect x="420" y="226" width="90" height="4" rx="2" fill="#E2001A"/>

  <!-- Tagline -->
  <text x="420" y="284"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        fill="#DDEEFF">Echtzeit-Abfahrten für Wien</text>

  <!-- Feature list -->
  <text x="424" y="356"
        font-family="Arial, Helvetica, sans-serif"
        font-size="19"
        fill="#BBDDFF">Haltestellen-ID  ·  GPS  ·  Favoriten  ·  Störungsmeldungen</text>

  <!-- Bottom red bar -->
  <rect x="0" y="468" width="1024" height="32" fill="#E2001A"/>

  <!-- "kostenlos &amp; werbefrei" badge -->
  <rect x="420" y="426" width="210" height="30" rx="15" fill="#000000" opacity="0.25"/>
  <text x="525" y="447"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        fill="#DDEEFF"
        text-anchor="middle">kostenlos &amp; werbefrei</text>

</svg>
